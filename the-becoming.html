<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Becoming</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=EB+Garamond:ital@0;1&display=swap');

  :root {
    --bg-0: #0a0612;
    --bg-1: #1a0e2e;
    --bg-2: #2a1248;
    --bg-3: #3d1a5c;
    --glow: #c89bff;
    --glow-soft: #a978e8;
    --text: #e8dcf7;
    --text-dim: #9b86bd;
    --text-faint: #6a5a85;
    --line: rgba(200, 155, 255, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--text);
    background:
      radial-gradient(ellipse 120% 80% at 20% -10%, rgba(120, 60, 180, 0.35), transparent 60%),
      radial-gradient(ellipse 100% 70% at 90% 110%, rgba(80, 40, 140, 0.4), transparent 55%),
      linear-gradient(165deg, var(--bg-0) 0%, var(--bg-1) 35%, var(--bg-2) 75%, var(--bg-1) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* drifting stars */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 70% 15%, rgba(200,155,255,0.6), transparent),
      radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 85% 70%, rgba(200,155,255,0.5), transparent),
      radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 45%, rgba(200,155,255,0.4), transparent),
      radial-gradient(1px 1px at 92% 35%, rgba(255,255,255,0.4), transparent);
    animation: drift 120s linear infinite;
    opacity: 0.7;
  }
  @keyframes drift {
    from { transform: translateY(0); }
    to { transform: translateY(-40px); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 28px 100px;
  }

  /* ---- Header ---- */
  header { text-align: center; margin-bottom: 52px; }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(3rem, 9vw, 5rem);
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #f3e9ff 0%, var(--glow) 60%, var(--glow-soft) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 50px rgba(200, 155, 255, 0.35);
    filter: drop-shadow(0 0 22px rgba(200, 155, 255, 0.25));
    line-height: 1.05;
  }
  .subtitle {
    font-style: italic;
    color: var(--text-dim);
    font-size: 1.05rem;
    margin-top: 10px;
    letter-spacing: 0.08em;
  }

  /* ---- Toggle ---- */
  .toggle {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 36px auto 8px;
    width: fit-content;
    padding: 5px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: rgba(20, 10, 35, 0.4);
    backdrop-filter: blur(8px);
  }
  .toggle button {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--text-dim);
    background: transparent;
    border: none;
    padding: 9px 30px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.5s ease;
    letter-spacing: 0.03em;
  }
  .toggle button.active {
    color: #fff;
    background: linear-gradient(135deg, rgba(120, 70, 180, 0.55), rgba(160, 100, 220, 0.4));
    box-shadow: 0 0 24px rgba(200, 155, 255, 0.3), inset 0 0 12px rgba(255,255,255,0.05);
  }
  .toggle button:hover:not(.active) { color: var(--text); }

  /* ---- Views ---- */
  .view { animation: fadeIn 1.1s ease; }
  .view[hidden] { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- The Arc ---- */
  .progress-wrap { margin: 40px 0 14px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .progress-track {
    height: 8px;
    border-radius: 100px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--glow-soft), var(--glow), #f0e2ff);
    box-shadow: 0 0 18px rgba(200, 155, 255, 0.6);
    transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .weeks { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
  .week {
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 20px;
    padding: 18px 24px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(25, 14, 42, 0.35);
    cursor: pointer;
    transition: all 0.5s ease;
    overflow: hidden;
  }
  .week:hover { background: rgba(40, 22, 66, 0.5); border-color: rgba(200,155,255,0.25); }
  .week .num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.6rem;
    color: var(--text-faint);
    min-width: 52px;
    transition: color 0.5s ease;
  }
  .week .theme {
    font-size: 1.12rem;
    color: var(--text-dim);
    transition: color 0.5s ease;
  }
  .week .label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 2px;
  }

  /* past weeks */
  .week.past .num { color: var(--glow-soft); }
  .week.past .theme { color: var(--text); }
  .week.past::after {
    content: "✦";
    position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
    color: var(--glow-soft); opacity: 0.5; font-size: 0.9rem;
  }

  /* current week glowing */
  .week.current {
    border-color: rgba(200, 155, 255, 0.6);
    background: linear-gradient(135deg, rgba(80, 40, 130, 0.55), rgba(50, 24, 90, 0.4));
    box-shadow: 0 0 40px rgba(200, 155, 255, 0.3), inset 0 0 30px rgba(200, 155, 255, 0.08);
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 36px rgba(200,155,255,0.22), inset 0 0 26px rgba(200,155,255,0.06); }
    50% { box-shadow: 0 0 56px rgba(200,155,255,0.42), inset 0 0 34px rgba(200,155,255,0.12); }
  }
  .week.current .num {
    color: #fff;
    text-shadow: 0 0 20px rgba(200,155,255,0.8);
  }
  .week.current .theme { color: #fff; }
  .week.current .label { color: var(--glow); }

  .set-week {
    margin-left: auto;
    align-self: center;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    border: 1px solid var(--line);
    background: transparent;
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    opacity: 0;
    transition: all 0.4s ease;
    white-space: nowrap;
  }
  .week:hover .set-week { opacity: 1; }
  .week.current .set-week { display: none; }
  .set-week:hover { color: var(--glow); border-color: rgba(200,155,255,0.4); }

  /* ---- The Pages ---- */
  .pages-head { text-align: center; margin: 38px 0 8px; }
  .pages-head .week-tag {
    font-style: italic;
    color: var(--glow);
    font-size: 1.3rem;
    font-family: 'Cormorant Garamond', serif;
    text-shadow: 0 0 24px rgba(200,155,255,0.4);
  }
  .date-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 18px 0 26px;
    color: var(--text-dim);
    font-style: italic;
  }
  .date-row button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    transition: all 0.4s ease;
  }
  .date-row button:hover { color: var(--glow); border-color: rgba(200,155,255,0.4); }
  .date-row .today-link {
    font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
    width: auto; border-radius: 100px; padding: 0 14px; height: 28px;
  }
  #dateLabel { min-width: 220px; text-align: center; font-size: 1.05rem; }

  .editor-frame {
    position: relative;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(15, 8, 28, 0.5);
    backdrop-filter: blur(6px);
    box-shadow: inset 0 0 50px rgba(120, 60, 180, 0.08), 0 20px 60px rgba(0,0,0,0.3);
    transition: border-color 0.6s ease, box-shadow 0.6s ease;
  }
  .editor-frame:focus-within {
    border-color: rgba(200,155,255,0.35);
    box-shadow: inset 0 0 60px rgba(120, 60, 180, 0.14), 0 0 40px rgba(200,155,255,0.12);
  }
  #pages {
    width: 100%;
    min-height: 420px;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 1.2rem;
    line-height: 2;
    padding: 38px 42px;
    letter-spacing: 0.01em;
  }
  #pages::placeholder {
    color: var(--text-faint);
    font-style: italic;
    opacity: 0.7;
  }

  .pages-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
  }
  .count { letter-spacing: 0.05em; }
  .count b { color: var(--glow); font-weight: 500; font-style: normal; }
  .saved-note {
    font-size: 0.85rem;
    color: var(--text-faint);
    opacity: 0;
    transition: opacity 0.6s ease;
    letter-spacing: 0.06em;
  }
  .saved-note.show { opacity: 1; }

  /* ---- Footer / data ---- */
  footer {
    margin-top: 60px;
    text-align: center;
    color: var(--text-faint);
    font-size: 0.82rem;
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .data-tools {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .data-tools button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-faint);
    padding: 7px 18px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    transition: all 0.4s ease;
  }
  .data-tools button:hover { color: var(--glow); border-color: rgba(200,155,255,0.3); }

  @media (max-width: 560px) {
    .wrap { padding: 44px 18px 80px; }
    #pages { padding: 28px 24px; font-size: 1.1rem; }
    .week { padding: 15px 18px; gap: 14px; }
    .set-week { opacity: 1; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">
  <header>
    <h1>The Becoming</h1>
    <div class="subtitle">a twelve-week passage through The Artist's Way</div>
    <div class="toggle">
      <button id="tabArc" class="active" onclick="setView('arc')">The arc</button>
      <button id="tabPages" onclick="setView('pages')">The pages</button>
    </div>
  </header>

  <!-- THE ARC -->
  <section id="viewArc" class="view">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progLeft">Week 1 of 12</span>
        <span id="progRight">8% of the way through</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progFill" style="width:8%"></div>
      </div>
    </div>
    <div class="weeks" id="weeks"></div>
  </section>

  <!-- THE PAGES -->
  <section id="viewPages" class="view" hidden>
    <div class="pages-head">
      <span class="week-tag" id="pagesWeekTag">Week 1 · Recovering a Sense of Safety</span>
    </div>
    <div class="date-row">
      <button onclick="shiftDay(-1)" title="Previous day">‹</button>
      <span id="dateLabel"></span>
      <button onclick="shiftDay(1)" title="Next day">›</button>
      <button class="today-link" onclick="goToday()">Today</button>
    </div>
    <div class="editor-frame">
      <textarea id="pages" placeholder="Three pages, longhand, before the day begins. Whatever wants to come — no one is reading but you…"></textarea>
    </div>
    <div class="pages-foot">
      <span class="count"><b id="wordCount">0</b> words &nbsp;·&nbsp; <span id="streakNote"></span></span>
      <span class="saved-note" id="savedNote">saved</span>
    </div>
  </section>

  <footer>
    <div>Every page is a small act of faith.</div>
    <div class="data-tools">
      <button onclick="exportData()">Export a backup file</button>
      <button onclick="document.getElementById('importFile').click()">Restore from file</button>
      <input type="file" id="importFile" accept="application/json" hidden onchange="importData(event)" />
    </div>
  </footer>
</div>

<script>
  const THEMES = [
    "Recovering a Sense of Safety",
    "Recovering a Sense of Identity",
    "Recovering a Sense of Power",
    "Recovering a Sense of Integrity",
    "Recovering a Sense of Possibility",
    "Recovering a Sense of Abundance",
    "Recovering a Sense of Connection",
    "Recovering a Sense of Strength",
    "Recovering a Sense of Compassion",
    "Recovering a Sense of Self-Protection",
    "Recovering a Sense of Autonomy",
    "Recovering a Sense of Faith"
  ];

  const STORE_KEY = "the-becoming-v1";

  // ---- state / persistence ----
  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { currentWeek: 1, pages: {} };  // pages: { "YYYY-MM-DD": "text" }
  }
  let state = loadState();

  function saveState() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  // ---- date helpers ----
  let viewDate = new Date();
  function dateKey(d) {
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function prettyDate(d) {
    return d.toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric", year:"numeric" });
  }

  // ---- view switching ----
  function setView(which) {
    const arc = which === "arc";
    document.getElementById("viewArc").hidden = !arc;
    document.getElementById("viewPages").hidden = arc;
    document.getElementById("tabArc").classList.toggle("active", arc);
    document.getElementById("tabPages").classList.toggle("active", !arc);
    if (!arc) document.getElementById("pages").focus();
  }

  // ---- the arc ----
  function renderArc() {
    const cur = state.currentWeek;
    const pct = Math.round((cur / 12) * 100);
    document.getElementById("progFill").style.width = pct + "%";
    document.getElementById("progLeft").textContent = `Week ${cur} of 12`;
    document.getElementById("progRight").textContent = `${pct}% of the way through`;

    const container = document.getElementById("weeks");
    container.innerHTML = "";
    THEMES.forEach((theme, i) => {
      const n = i + 1;
      const el = document.createElement("div");
      el.className = "week" + (n < cur ? " past" : n === cur ? " current" : "");
      el.innerHTML = `
        <span class="num">${String(n).padStart(2,"0")}</span>
        <div>
          <div class="label">${n === cur ? "you are here" : n < cur ? "behind you" : "still ahead"}</div>
          <div class="theme">${theme}</div>
        </div>
        <button class="set-week" onclick="event.stopPropagation(); setWeek(${n})">Begin this week</button>
      `;
      el.onclick = () => { setWeek(n); };
      container.appendChild(el);
    });
  }

  function setWeek(n) {
    state.currentWeek = n;
    saveState();
    renderArc();
    renderPagesHeader();
  }

  // ---- the pages ----
  function renderPagesHeader() {
    const cur = state.currentWeek;
    document.getElementById("pagesWeekTag").textContent = `Week ${cur} · ${THEMES[cur-1]}`;
  }

  function renderPages() {
    document.getElementById("dateLabel").textContent = prettyDate(viewDate);
    const key = dateKey(viewDate);
    const ta = document.getElementById("pages");
    ta.value = state.pages[key] || "";
    updateCount();
    updateStreakNote();
  }

  function updateCount() {
    const text = document.getElementById("pages").value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    document.getElementById("wordCount").textContent = words.toLocaleString();
  }

  function updateStreakNote() {
    // count consecutive days ending today (or viewDate) that have entries
    let streak = 0;
    const d = new Date();
    for (;;) {
      if (state.pages[dateKey(d)] && state.pages[dateKey(d)].trim()) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
    }
    const note = document.getElementById("streakNote");
    if (streak >= 2) note.textContent = `${streak} mornings in a row`;
    else if (streak === 1) note.textContent = `the streak begins`;
    else note.textContent = `a blank page waits`;
  }

  let saveTimer = null;
  function onType() {
    const key = dateKey(viewDate);
    const val = document.getElementById("pages").value;
    if (val.trim()) state.pages[key] = val;
    else delete state.pages[key];
    updateCount();
    saveState();
    flashSaved();
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(updateStreakNote, 400);
  }

  let savedFadeTimer = null;
  function flashSaved() {
    const n = document.getElementById("savedNote");
    n.classList.add("show");
    if (savedFadeTimer) clearTimeout(savedFadeTimer);
    savedFadeTimer = setTimeout(() => n.classList.remove("show"), 1400);
  }

  function shiftDay(delta) {
    viewDate.setDate(viewDate.getDate() + delta);
    renderPages();
  }
  function goToday() { viewDate = new Date(); renderPages(); }

  // ---- export / import (the "file" the user can keep) ----
  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "the-becoming-" + dateKey(new Date()) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  }
  function importData(ev) {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data && typeof data === "object" && data.pages) {
          state = { currentWeek: data.currentWeek || 1, pages: data.pages || {} };
          saveState();
          renderArc(); renderPagesHeader(); renderPages();
        }
      } catch (e) { alert("That file couldn't be read as a Becoming backup."); }
    };
    reader.readAsText(file);
    ev.target.value = "";
  }

  // ---- init ----
  document.getElementById("pages").addEventListener("input", onType);
  renderArc();
  renderPagesHeader();
  renderPages();
</script>
</body>
</html>
